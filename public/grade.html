<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채점하기 — Word Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; min-height: 100vh; }

  header { background: #2d3748; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
  .back-btn { color: rgba(255,255,255,.7); text-decoration: none; font-size: .85rem; white-space: nowrap; }
  .back-btn:hover { color: #fff; }

  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  /* 학생 탭 */
  .student-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .stu-tab { padding: 9px 18px; border-radius: 20px; border: 2px solid #e2e8f0; background: #fff;
             font-size: .88rem; font-weight: 600; color: #718096; cursor: pointer; transition: all .18s; }
  .stu-tab.active { border-color: #667eea; background: #667eea; color: #fff; }
  .stu-tab:hover:not(.active) { border-color: #667eea; color: #667eea; }

  /* 문제 카드 */
  .section-title { font-size: .8rem; font-weight: 700; color: #718096; text-transform: uppercase;
                   letter-spacing: .05em; margin: 20px 0 10px; }
  .problem-card { background: #fff; border-radius: 12px; padding: 16px 18px; margin-bottom: 8px;
                  box-shadow: 0 1px 6px rgba(0,0,0,.05); display: flex; align-items: center; gap: 14px; }
  .problem-num { font-size: .8rem; font-weight: 700; color: #a0aec0; min-width: 28px; }
  .problem-info { flex: 1; }
  .problem-word { font-size: 1rem; font-weight: 700; color: #2d3748; }
  .problem-ko   { font-size: .85rem; color: #718096; margin-top: 2px; }
  .problem-sentence { font-size: .85rem; color: #4a5568; font-style: italic; margin-top: 4px; line-height: 1.5; }
  .problem-answer { font-size: .78rem; color: #667eea; font-weight: 600; margin-top: 4px; }

  /* O/X 버튼 */
  .grade-btns { display: flex; gap: 6px; }
  .btn-o, .btn-x { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #e2e8f0;
                   background: #fff; font-size: 1.1rem; cursor: pointer; transition: all .15s;
                   display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .btn-o:hover { border-color: #38a169; background: #f0fff4; }
  .btn-x:hover { border-color: #e53e3e; background: #fff5f5; }
  .btn-o.active { border-color: #38a169; background: #38a169; color: #fff; }
  .btn-x.active { border-color: #e53e3e; background: #e53e3e; color: #fff; }

  /* 요약 바 */
  .summary-bar { background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
                 box-shadow: 0 1px 6px rgba(0,0,0,.05); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .summary-score { font-size: 1.4rem; font-weight: 800; color: #2d3748; }
  .summary-label { font-size: .85rem; color: #718096; }
  .summary-detail { display: flex; gap: 12px; margin-left: auto; }
  .score-o { font-weight: 700; color: #38a169; }
  .score-x { font-weight: 700; color: #e53e3e; }

  /* 저장 버튼 */
  .save-area { position: sticky; bottom: 0; background: #f0f4f8; padding: 16px 0 24px; }
  .save-btn { width: 100%; padding: 14px; background: #667eea; color: #fff; border: none;
              border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s; }
  .save-btn:hover { background: #5a67d8; }
  .save-btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .save-msg { text-align: center; font-size: .85rem; margin-top: 8px; height: 18px; }
  .save-msg.ok  { color: #38a169; }
  .save-msg.err { color: #e53e3e; }

  .empty { text-align: center; color: #a0aec0; padding: 48px 0; }

  /* Part 2/3 안내 */
  .info-box { background: #ebf8ff; border: 1px solid #bee3f8; border-radius: 10px; padding: 12px 16px;
              font-size: .85rem; color: #2b6cb0; margin-bottom: 14px; line-height: 1.6; }

  /* 토스트 */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
           background: #2d3748; color: #fff; padding: 12px 20px; border-radius: 10px;
           font-size: .9rem; font-weight: 600; white-space: nowrap;
           opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 999; }
  .toast.ok  { background: #38a169; }
  .toast.err { background: #e53e3e; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <a href="admin.html" class="back-btn">← 관리자</a>
  <h1>✏️ 채점하기</h1>
  <a href="print.html" class="back-btn">시험지 →</a>
</header>

<div class="container">
  <div id="app"><div class="empty">채점 데이터를 불러오는 중...</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
let toastTimer = null
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast')
  if (toastTimer) clearTimeout(toastTimer)
  t.textContent = msg
  t.className = `toast ${type} show`
  toastTimer = setTimeout(() => { t.classList.remove('show') }, 3000)
}

// 관리자 로그인 체크
if (!localStorage.getItem('adminToken')) {
  window.location.href = 'login.html'
}

const data = JSON.parse(
  localStorage.getItem('printJob') || sessionStorage.getItem('printJob') || 'null'
)

const SIX_HOURS = 6 * 60 * 60 * 1000
const isExpired = data?.createdAt && (Date.now() - data.createdAt > SIX_HOURS)

if (!data?.jobs?.length || isExpired) {
  document.getElementById('app').innerHTML = isExpired
    ? `<div class="empty">채점 데이터가 만료됐습니다. (6시간 초과)<br><a href="admin.html" style="color:#667eea">관리자 화면으로 돌아가기 →</a></div>`
    : '<div class="empty">채점 데이터가 없습니다.<br>관리자 화면 → 프린트 탭에서 시험지를 먼저 생성하세요.</div>'
} else {
  let currentJob = 0
  // 각 job, 각 문제별 채점 상태: grades[jobIdx][qKey] = true(O) | false(X) | null(미채점)
  const grades = data.jobs.map(job => {
    const g = {}
    ;(job.part1 || []).forEach((w, i) => { g[`p1_${i}`] = null })
    ;(job.part2 || []).forEach((p, i) => { g[`p2_${i}`] = null })
    ;(job.part3 || []).forEach((p, i) => { g[`p3_${i}`] = null })
    return g
  })

  function score(jobIdx) {
    const g = grades[jobIdx]
    const total = Object.keys(g).length
    const correct = Object.values(g).filter(v => v === true).length
    const graded  = Object.values(g).filter(v => v !== null).length
    return { total, correct, graded }
  }

  function renderTabs() {
    return `<div class="student-tabs">
      ${data.jobs.map((job, i) => {
        const { correct, total, graded } = score(i)
        const badge = graded === total ? ` (${correct}/${total})` : graded > 0 ? ` (${graded}/${total} 채점)` : ''
        return `<div class="stu-tab ${i === currentJob ? 'active' : ''}" onclick="switchJob(${i})">${job.studentName}${badge}</div>`
      }).join('')}
    </div>`
  }

  function renderJob(jobIdx) {
    const job = data.jobs[jobIdx]
    const g = grades[jobIdx]
    const { correct, total, graded } = score(jobIdx)

    let html = renderTabs()

    // 요약
    html += `<div class="summary-bar">
      <div>
        <div class="summary-score">${graded === total ? `${correct}점` : `${graded}/${total} 채점됨`}</div>
        <div class="summary-label">${job.studentName}</div>
      </div>
      <div class="summary-detail">
        <span class="score-o">O: ${Object.values(g).filter(v => v === true).length}</span>
        <span class="score-x">X: ${Object.values(g).filter(v => v === false).length}</span>
      </div>
    </div>`

    // Part 1
    if (job.part1?.length) {
      html += `<div class="section-title">Part 1. 단어 (${job.part1.length}문제)</div>`
      job.part1.forEach((w, i) => {
        const isO = g[`p1_${i}`] === true
        const isX = g[`p1_${i}`] === false
        const blankType = w.blank_type === 'english' ? '영어 빈칸' : w.blank_type === 'korean' ? '한국어 빈칸' : '둘 다 빈칸'
        html += `<div class="problem-card" id="card_p1_${jobIdx}_${i}">
          <div class="problem-num">${i + 1}</div>
          <div class="problem-info">
            <div class="problem-word">${w.english}</div>
            <div class="problem-ko">${w.korean} · <span style="color:#a0aec0;font-size:.78rem">${blankType}</span></div>
          </div>
          <div class="grade-btns">
            <button class="btn-o ${isO ? 'active' : ''}" onclick="setGrade(${jobIdx},'p1_${i}',true)">O</button>
            <button class="btn-x ${isX ? 'active' : ''}" onclick="setGrade(${jobIdx},'p1_${i}',false)">X</button>
          </div>
        </div>`
      })
    }

    // Part 2
    if (job.part2?.length) {
      html += `<div class="section-title">Part 2. 어휘 (${job.part2.length}문제)</div>`
      html += `<div class="info-box">Part 2/3는 채점 기록용입니다. 단어장 박스에는 반영되지 않습니다.</div>`
      job.part2.forEach((p, i) => {
        const num = (job.part1||[]).length + i + 1
        const isO = g[`p2_${i}`] === true
        const isX = g[`p2_${i}`] === false
        html += `<div class="problem-card" id="card_p2_${jobIdx}_${i}">
          <div class="problem-num">${num}</div>
          <div class="problem-info">
            <div class="problem-sentence">${p.sentence}</div>
            <div class="problem-answer">정답: ${p.answer}</div>
          </div>
          <div class="grade-btns">
            <button class="btn-o ${isO ? 'active' : ''}" onclick="setGrade(${jobIdx},'p2_${i}',true)">O</button>
            <button class="btn-x ${isX ? 'active' : ''}" onclick="setGrade(${jobIdx},'p2_${i}',false)">X</button>
          </div>
        </div>`
      })
    }

    // Part 3
    if (job.part3?.length) {
      html += `<div class="section-title">Part 3. 문법 (${job.part3.length}문제)</div>`
      job.part3.forEach((p, i) => {
        const num = (job.part1||[]).length + (job.part2||[]).length + i + 1
        const isO = g[`p3_${i}`] === true
        const isX = g[`p3_${i}`] === false
        html += `<div class="problem-card" id="card_p3_${jobIdx}_${i}">
          <div class="problem-num">${num}</div>
          <div class="problem-info">
            <div class="problem-sentence">${p.sentence}</div>
            <div class="problem-answer">정답: ${p.answer}${p.grammar_point ? ` · [${p.grammar_point}]` : ''}</div>
          </div>
          <div class="grade-btns">
            <button class="btn-o ${isO ? 'active' : ''}" onclick="setGrade(${jobIdx},'p3_${i}',true)">O</button>
            <button class="btn-x ${isX ? 'active' : ''}" onclick="setGrade(${jobIdx},'p3_${i}',false)">X</button>
          </div>
        </div>`
      })
    }

    // 저장 버튼
    html += `<div class="save-area">
      <button class="save-btn" id="saveBtn" onclick="saveGrades(${jobIdx})">💾 ${job.studentName} 채점 저장</button>
    </div>`

    document.getElementById('app').innerHTML = html
  }

  function switchJob(idx) {
    currentJob = idx
    renderJob(idx)
  }

  function setGrade(jobIdx, key, correct) {
    grades[jobIdx][key] = correct
    renderJob(jobIdx)
  }

  async function saveGrades(jobIdx) {
    const btn = document.getElementById('saveBtn')
    const job = data.jobs[jobIdx]
    const g = grades[jobIdx]

    // Part 1만 단어장 박스에 반영 (word.id 존재)
    const part1Words = job.part1 || []
    const toUpdate = part1Words
      .map((w, i) => ({ id: w.id, correct: g[`p1_${i}`] }))
      .filter(item => item.id && item.correct !== null)

    if (!toUpdate.length) {
      showToast('Part 1 문제를 먼저 채점해주세요.', 'err')
      return
    }

    btn.disabled = true
    btn.textContent = '저장 중...'
    try {
      await Promise.all(toUpdate.map(item => API.reviewWord(item.id, item.correct)))
      const oCount = toUpdate.filter(t=>t.correct).length
      const xCount = toUpdate.filter(t=>!t.correct).length
      showToast(`✓ ${toUpdate.length}개 저장 완료   O ${oCount}개 · X ${xCount}개`, 'ok')
      btn.textContent = '✓ 저장됨'
    } catch (e) {
      showToast('저장 실패: ' + e.message, 'err')
      btn.disabled = false
      btn.textContent = '💾 채점 저장'
    }
  }

  renderJob(0)
}
</script>
</body>
</html>
