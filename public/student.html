<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>내 단어장 — Word Gacha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 0 0 40px; }
  header { background: #667eea; color: #fff; padding: 20px 20px 0; }
  header .top { display: flex; align-items: flex-start; flex-direction: column; padding-bottom: 0; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  header p  { font-size: .85rem; opacity: .85; margin-top: 4px; }
  .back { color: #fff; opacity: .8; text-decoration: none; font-size: .85rem; display: inline-block; margin-bottom: 8px; }
  .back:hover { opacity: 1; }

  /* 탭 */
  .tabs { display: flex; margin-top: 16px; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: .9rem; font-weight: 600; color: rgba(255,255,255,.7);
         border-bottom: 3px solid transparent; transition: all .18s; }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .tab:hover:not(.active) { color: rgba(255,255,255,.9); }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 입력 폼 */
  .add-card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .add-card h2 { font-size: 1rem; font-weight: 700; color: #2d3748; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .row input { flex: 1; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: .95rem; outline: none; transition: border-color .2s; }
  .row input:focus { border-color: #667eea; }
  .row input::placeholder { color: #cbd5e0; }
  textarea.grammar-input {
    width: 100%; padding: 11px 13px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: .95rem; outline: none; transition: border-color .2s; resize: vertical;
    min-height: 80px; font-family: inherit;
  }
  textarea.grammar-input:focus { border-color: #667eea; }
  textarea.grammar-input::placeholder { color: #cbd5e0; }
  .submit-btn { width: 100%; padding: 12px; background: #667eea; color: #fff; border: none; border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 4px; }
  .submit-btn:hover { background: #5a67d8; }
  .msg { font-size: .82rem; margin-top: 8px; height: 18px; }
  .msg.ok  { color: #38a169; }
  .msg.err { color: #e53e3e; }

  /* 섹션 타이틀 */
  .section-title { font-size: .85rem; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }

  /* 단어 목록 */
  .word-list { display: flex; flex-direction: column; gap: 8px; }
  .word-item { background: #fff; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.05); }
  .word-en { font-weight: 700; color: #2d3748; font-size: .95rem; flex: 1; }
  .word-ko { color: #718096; font-size: .9rem; flex: 1; }
  .badge { font-size: .72rem; padding: 3px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .badge.pending  { background: #fefcbf; color: #b7791f; }
  .badge.answered { background: #c6f6d5; color: #276749; }
  .empty-words { text-align: center; color: #a0aec0; padding: 32px 0; font-size: .9rem; }

  /* 문법 Q&A */
  .qa-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,.05); margin-bottom: 8px; }
  .qa-q { font-weight: 700; color: #2d3748; font-size: .95rem; margin-bottom: 6px; }
  .qa-a { color: #4a5568; font-size: .9rem; line-height: 1.6; padding: 10px 12px; background: #f7fafc; border-radius: 8px; }
  .qa-pending { color: #b7791f; font-size: .85rem; padding: 8px 12px; background: #fefcbf; border-radius: 8px; }
  .qa-footer { display: flex; justify-content: flex-end; margin-top: 8px; }
  .qa-mine-badge { font-size: .72rem; padding: 2px 8px; border-radius: 20px; background: #bee3f8; color: #2b6cb0; font-weight: 600; margin-right: auto; }
  .btn-delete-q { font-size: .75rem; padding: 4px 10px; border: none; border-radius: 8px; background: #fed7d7; color: #c53030; cursor: pointer; font-weight: 600; }
  .btn-delete-q:hover { background: #feb2b2; }

  .divider { height: 1px; background: #e2e8f0; margin: 20px 0; }

  /* ── 교재 단어 탭 ─────────────────────────────────── */
  .unit-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .unit-btn { padding: 7px 16px; border-radius: 20px; border: 2px solid #e2e8f0; background: #fff;
              font-size: .85rem; font-weight: 600; color: #718096; cursor: pointer; transition: all .18s; }
  .unit-btn.active { border-color: #667eea; background: #667eea; color: #fff; }
  .unit-btn:hover:not(.active) { border-color: #667eea; color: #667eea; }

  .tb-card { background: #fff; border-radius: 16px; padding: 22px 20px; box-shadow: 0 2px 14px rgba(0,0,0,.07);
             margin-bottom: 12px; border-left: 4px solid #667eea; }
  .tb-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .tb-unit-tag { font-size: .72rem; font-weight: 700; background: #ebf4ff; color: #2b6cb0;
                 padding: 3px 9px; border-radius: 20px; }
  .tb-pos-tag  { font-size: .72rem; font-weight: 600; background: #f0fff4; color: #276749;
                 padding: 3px 9px; border-radius: 20px; }
  .tb-english  { font-size: 1.3rem; font-weight: 800; color: #2d3748; margin-bottom: 4px; }
  .tb-korean   { font-size: 1rem; color: #4a5568; margin-bottom: 10px; }
  .tb-example  { font-size: .82rem; color: #718096; line-height: 1.6; background: #f7fafc;
                 padding: 9px 12px; border-radius: 8px; margin-bottom: 14px; font-style: italic; }
  .tb-actions  { display: flex; gap: 10px; }
  .btn-know    { flex: 1; padding: 11px; border-radius: 10px; border: 2px solid #68d391; background: #f0fff4;
                 color: #276749; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .18s; }
  .btn-know:hover    { background: #68d391; color: #fff; }
  .btn-dontknow      { flex: 1; padding: 11px; border-radius: 10px; border: 2px solid #fc8181; background: #fff5f5;
                       color: #c53030; font-weight: 700; font-size: .9rem; cursor: pointer; transition: all .18s; }
  .btn-dontknow:hover { background: #fc8181; color: #fff; }
  .btn-added   { flex: 1; padding: 11px; border-radius: 10px; border: 2px solid #cbd5e0; background: #f7fafc;
                 color: #a0aec0; font-weight: 700; font-size: .9rem; cursor: default; }

  .tb-progress { background: #f7fafc; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
                 display: flex; align-items: center; gap: 12px; }
  .tb-progress-text { font-size: .85rem; color: #4a5568; flex: 1; }
  .tb-progress-text strong { color: #667eea; }
  .tb-reload-btn { padding: 7px 14px; border-radius: 8px; border: none; background: #667eea; color: #fff;
                   font-size: .8rem; font-weight: 600; cursor: pointer; }
  .tb-reload-btn:hover { background: #5a67d8; }

  .tb-grammar-card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 1px 8px rgba(0,0,0,.06);
                     margin-bottom: 10px; border-left: 4px solid #9f7aea; }
  .tb-grammar-point { font-size: .8rem; font-weight: 700; color: #6b46c1; background: #faf5ff;
                      padding: 3px 9px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
  .tb-grammar-q { font-weight: 700; color: #2d3748; font-size: .9rem; margin-bottom: 6px; }
  .tb-grammar-pattern { font-size: .8rem; color: #718096; background: #f7fafc; padding: 6px 10px;
                        border-radius: 6px; font-family: monospace; margin-bottom: 8px; }
  .tb-grammar-sentence { font-size: .85rem; color: #4a5568; font-style: italic; margin-bottom: 8px;
                         padding: 8px 12px; background: #fffaf0; border-radius: 6px; }
  .tb-grammar-toggle { font-size: .78rem; color: #667eea; cursor: pointer; font-weight: 600;
                       border: none; background: none; padding: 0; text-decoration: underline; }
  .tb-grammar-answer { display: none; margin-top: 8px; padding: 10px 12px; background: #f0fff4;
                       border-radius: 8px; font-size: .85rem; color: #276749; line-height: 1.6; }
  .tb-grammar-explanation { font-size: .82rem; color: #718096; line-height: 1.6; margin-bottom: 6px; }

  /* ── 수행평가 탭 ─────────────────────────────────────── */
  .wp-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .wp-type-btn {
    padding: 16px 12px; border-radius: 14px; border: 2px solid #e2e8f0; background: #fff;
    font-size: .88rem; font-weight: 600; color: #4a5568; cursor: pointer;
    transition: all .18s; text-align: center; line-height: 1.5;
  }
  .wp-type-btn .wp-type-icon { font-size: 1.5rem; display: block; margin-bottom: 6px; }
  .wp-type-btn.selected { border-color: #667eea; background: #ebf4ff; color: #3c4fb5; }
  .wp-type-btn:hover:not(.selected) { border-color: #667eea; }

  .wp-hint-box { background: #f7fafc; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .wp-hint-label { font-size: .75rem; font-weight: 700; color: #718096; text-transform: uppercase;
                   letter-spacing: .06em; margin-bottom: 8px; }
  .wp-hint-words { display: flex; flex-wrap: wrap; gap: 6px; }
  .wp-hint-word { padding: 4px 12px; border-radius: 20px; background: #fff; border: 1.5px solid #e2e8f0;
                  font-size: .82rem; font-weight: 600; color: #2d3748; }
  .wp-hint-word span { color: #718096; font-weight: 400; }

  .wp-generate-btn {
    width: 100%; padding: 14px; background: #667eea; color: #fff; border: none;
    border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .2s;
  }
  .wp-generate-btn:hover { background: #5a67d8; }
  .wp-generate-btn:disabled { background: #a0aec0; cursor: not-allowed; }

  /* 문제 카드 */
  .wp-problem-card { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 14px;
                     box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .wp-problem-tag { display: inline-block; font-size: .72rem; font-weight: 700; padding: 3px 10px;
                    border-radius: 20px; background: #ebf4ff; color: #2b6cb0; margin-bottom: 10px; }
  .wp-problem-instruction { font-size: .95rem; font-weight: 700; color: #2d3748; margin-bottom: 10px; line-height: 1.6; }
  .wp-problem-prompt { font-size: .88rem; color: #4a5568; background: #f7fafc; border-radius: 8px;
                       padding: 12px 14px; margin-bottom: 12px; line-height: 1.8; font-style: italic; }
  .wp-conditions { margin-bottom: 14px; }
  .wp-conditions-title { font-size: .78rem; font-weight: 700; color: #718096; margin-bottom: 6px; }
  .wp-condition-item { font-size: .88rem; color: #4a5568; padding: 4px 0; display: flex; gap: 6px; }
  .wp-condition-num { font-weight: 700; color: #667eea; min-width: 18px; }

  /* 답안 입력 */
  .wp-answer-area {
    width: 100%; min-height: 120px; padding: 13px 14px; border: 2px solid #e2e8f0;
    border-radius: 12px; font-size: .93rem; font-family: inherit; resize: vertical;
    outline: none; transition: border-color .2s; line-height: 1.7;
  }
  .wp-answer-area:focus { border-color: #667eea; }
  .wp-answer-area::placeholder { color: #cbd5e0; }
  .wp-char-count { font-size: .75rem; color: #a0aec0; text-align: right; margin-top: 4px; }
  .wp-submit-row { display: flex; gap: 8px; margin-top: 12px; }
  .wp-submit-btn {
    flex: 1; padding: 13px; background: #667eea; color: #fff; border: none;
    border-radius: 10px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .2s;
  }
  .wp-submit-btn:hover { background: #5a67d8; }
  .wp-submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .wp-new-btn {
    padding: 13px 18px; background: #fff; border: 1.5px solid #e2e8f0; color: #4a5568;
    border-radius: 10px; font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .wp-new-btn:hover { border-color: #667eea; color: #667eea; }

  /* 채점 결과 */
  .wp-score-header { background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 12px;
                     box-shadow: 0 2px 12px rgba(0,0,0,.06); text-align: center; }
  .wp-total-score { font-size: 2.2rem; font-weight: 800; color: #2d3748; }
  .wp-total-denom { font-size: 1.1rem; color: #a0aec0; font-weight: 400; }
  .wp-score-bar-wrap { background: #e2e8f0; border-radius: 20px; height: 10px; margin: 12px 0 4px; overflow: hidden; }
  .wp-score-bar { height: 100%; border-radius: 20px; background: linear-gradient(90deg,#667eea,#764ba2); transition: width .6s ease; }

  .wp-rubric-card { background: #fff; border-radius: 12px; padding: 16px 18px; margin-bottom: 8px;
                    box-shadow: 0 1px 6px rgba(0,0,0,.05); }
  .wp-rubric-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .wp-rubric-name { font-weight: 700; color: #2d3748; font-size: .9rem; flex: 1; }
  .wp-rubric-score { font-size: 1rem; font-weight: 800; }
  .wp-rubric-score.s0 { color: #e53e3e; }
  .wp-rubric-score.s1 { color: #dd6b20; }
  .wp-rubric-score.s2 { color: #d69e2e; }
  .wp-rubric-score.s3 { color: #38a169; }
  .wp-rubric-dots { display: flex; gap: 4px; }
  .wp-dot { width: 10px; height: 10px; border-radius: 50%; background: #e2e8f0; }
  .wp-dot.on { background: #667eea; }
  .wp-rubric-comment { font-size: .85rem; color: #4a5568; line-height: 1.6; margin-bottom: 6px; }
  .wp-rubric-improve { font-size: .82rem; color: #718096; line-height: 1.6; padding: 8px 12px;
                       background: #fffaf0; border-radius: 8px; border-left: 3px solid #f6ad55;
                       display: none; }
  .wp-improve-toggle { font-size: .78rem; color: #667eea; border: none; background: none;
                       cursor: pointer; font-weight: 600; padding: 0; text-decoration: underline; }

  .wp-model-card { background: #f7fafc; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .wp-model-title { font-size: .8rem; font-weight: 700; color: #718096; text-transform: uppercase;
                    letter-spacing: .05em; margin-bottom: 10px; cursor: pointer;
                    display: flex; align-items: center; gap: 6px; }
  .wp-model-body { font-size: .88rem; color: #2d3748; line-height: 1.8; display: none; }

  .wp-word-results { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .wp-word-tag { font-size: .8rem; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
  .wp-word-tag.used { background: #c6f6d5; color: #276749; }
  .wp-word-tag.unused { background: #fed7d7; color: #c53030; }

  .wp-retry-btn {
    width: 100%; padding: 13px; background: #fff; border: 2px solid #667eea; color: #667eea;
    border-radius: 12px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .wp-retry-btn:hover { background: #667eea; color: #fff; }

  .wp-loading { text-align: center; padding: 32px 0; color: #a0aec0; font-size: .9rem; }
  .wp-loading-spinner { font-size: 1.8rem; animation: spin 1s linear infinite; display: block; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="top">
    <a href="index.html" class="back">← 돌아가기</a>
    <h1 id="studentName">단어장</h1>
    <p>모르는 단어와 문법을 추가하세요</p>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="words">📚 단어장</div>
    <div class="tab" data-tab="textbook">📖 교재 단어</div>
    <div class="tab" data-tab="grammar">❓ 문법 질문</div>
    <div class="tab" data-tab="writing">✍️ 수행평가</div>
  </div>
</header>

<div class="container">

  <!-- ── 단어 탭 ───────────────────────────────── -->
  <div class="tab-content active" id="tab-words">
    <div class="add-card">
      <h2>+ 새 단어 추가</h2>
      <div class="row">
        <input id="enInput" type="text" placeholder="영어 단어 (예: ambiguous)">
      </div>
      <div class="row">
        <input id="koInput" type="text" placeholder="한국어 뜻 (예: 모호한)">
      </div>
      <button class="submit-btn" id="addBtn">추가하기</button>
      <div class="msg" id="wordMsg"></div>
    </div>

    <p class="section-title">내 단어 목록</p>
    <div id="wordList"><div class="empty-words">단어를 추가해보세요 📝</div></div>
  </div>

  <!-- ── 교재 단어 탭 ──────────────────────────── -->
  <div class="tab-content" id="tab-textbook">
    <!-- 교재 정보 헤더 -->
    <div id="tbInfoHeader" style="background:#f0f4ff;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.88rem;color:#3b4a7a;display:none;"></div>

    <!-- Unit 선택 (동적으로 채워짐) -->
    <div class="unit-selector" id="unitSelector">
      <button class="unit-btn active" data-unit="">전체</button>
    </div>

    <!-- 진행 상황 + 새로고침 -->
    <div class="tb-progress">
      <div class="tb-progress-text" id="tbProgressText">교재 단어를 불러오는 중...</div>
      <button class="tb-reload-btn" id="tbReloadBtn">🔄 새 단어</button>
    </div>

    <!-- 추천 단어 목록 -->
    <div id="tbWordList"><div class="empty-words">불러오는 중... ⏳</div></div>

    <div class="divider"></div>
    <p class="section-title">교재 핵심 문법</p>
    <div id="tbGrammarList"><div class="empty-words">불러오는 중... ⏳</div></div>
  </div>

  <!-- ── 수행평가 탭 ───────────────────────────── -->
  <div class="tab-content" id="tab-writing">
    <div id="wp-app">
      <!-- JS로 렌더링 -->
    </div>
  </div>

  <!-- ── 문법 질문 탭 ──────────────────────────── -->
  <div class="tab-content" id="tab-grammar">
    <div class="add-card">
      <h2>❓ 문법 질문하기</h2>
      <textarea class="grammar-input" id="grammarInput" placeholder="궁금한 영어 문법을 질문해주세요&#10;예) 현재완료와 과거시제의 차이가 무엇인가요?"></textarea>
      <button class="submit-btn" id="addGrammarBtn">질문 올리기</button>
      <div class="msg" id="grammarMsg"></div>
    </div>

    <p class="section-title">내 질문</p>
    <div id="myGrammarList"><div class="empty-words">아직 질문이 없어요 ✏️</div></div>

    <div class="divider"></div>

    <p class="section-title">선생님 문법 자료</p>
    <div id="teacherGrammarList"><div class="empty-words">등록된 문법 자료가 없어요</div></div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
// ── 버전 체크 & 자동 새로고침 ────────────────────────────────
(async () => {
  try {
    const res  = await fetch('version.json?_=' + Date.now());
    const { v } = await res.json();
    const saved = localStorage.getItem('appVersion');
    if (saved && saved !== v) {
      localStorage.setItem('appVersion', v);
      location.reload(true);
      return;
    }
    localStorage.setItem('appVersion', v);
  } catch {}
})();
</script>
<script>
  const studentId   = sessionStorage.getItem('studentId');
  const studentName = sessionStorage.getItem('studentName');
  if (!studentId) { window.location.href = 'index.html'; }
  document.getElementById('studentName').textContent = studentName + '님의 단어장';

  // ── 탭 전환 ──────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'grammar')  loadGrammar();
      if (tab.dataset.tab === 'textbook') loadTextbook();
      if (tab.dataset.tab === 'writing')  wpInit();
    };
  });

  // ── 단어 ─────────────────────────────────────────────────
  async function loadWords() {
    try {
      const words = await API.getMyWords(studentId);
      const list  = document.getElementById('wordList');
      if (!words.length) { list.innerHTML = '<div class="empty-words">단어를 추가해보세요 📝</div>'; return; }
      list.innerHTML = words.map(w => `
        <div class="word-item">
          <span class="word-en">${w.english}</span>
          <span class="word-ko">${w.korean}</span>
          <span class="badge ${w.status}">${w.status === 'pending' ? '⏳ 대기중' : '✅ 승인됨'}</span>
        </div>
      `).join('');
    } catch { }
  }

  async function addWord() {
    const en  = document.getElementById('enInput').value.trim();
    const ko  = document.getElementById('koInput').value.trim();
    const msg = document.getElementById('wordMsg');
    msg.className = 'msg'; msg.textContent = '';
    if (!en || !ko) { msg.className = 'msg err'; msg.textContent = '영어 단어와 뜻을 모두 입력하세요.'; return; }
    try {
      await API.addWord(studentId, { english: en, korean: ko });
      document.getElementById('enInput').value = '';
      document.getElementById('koInput').value = '';
      msg.className = 'msg ok'; msg.textContent = '추가됐어요! 선생님이 확인 후 승인합니다.';
      loadWords();
    } catch (e) {
      msg.className = 'msg err'; msg.textContent = e.message;
    }
  }

  document.getElementById('addBtn').onclick = addWord;
  document.getElementById('koInput').addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

  // ── 문법 Q&A ─────────────────────────────────────────────
  async function loadGrammar() {
    try {
      const all = await API.getGrammar();

      // 내 질문: student_id가 나인 것
      const mine    = all.filter(g => g.student_id === studentId);
      // 선생님 자료: student_id가 null이고 answered인 것
      const teacher = all.filter(g => !g.student_id && g.status === 'answered');

      renderMyGrammar(mine);
      renderTeacherGrammar(teacher);
    } catch { }
  }

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderMyGrammar(list) {
    const el = document.getElementById('myGrammarList');
    if (!list.length) { el.innerHTML = '<div class="empty-words">아직 질문이 없어요 ✏️</div>'; return; }
    el.innerHTML = list.map(g => `
      <div class="qa-card">
        <div class="qa-q">Q. ${esc(g.question)}</div>
        ${g.status === 'answered' && g.answer
          ? `<div class="qa-a">${esc(g.answer)}</div>`
          : `<div class="qa-pending">⏳ 선생님 답변을 기다리는 중이에요</div>`
        }
        <div class="qa-footer">
          <span class="qa-mine-badge">내 질문</span>
          <button class="btn-delete-q" onclick="deleteMyQuestion('${g.id}')">삭제</button>
        </div>
      </div>
    `).join('');
  }

  function renderTeacherGrammar(list) {
    const el = document.getElementById('teacherGrammarList');
    if (!list.length) { el.innerHTML = '<div class="empty-words">등록된 문법 자료가 없어요</div>'; return; }
    el.innerHTML = list.map(g => `
      <div class="qa-card">
        <div class="qa-q">Q. ${esc(g.question)}</div>
        <div class="qa-a">${esc(g.answer)}</div>
      </div>
    `).join('');
  }

  async function addGrammarQuestion() {
    const q   = document.getElementById('grammarInput').value.trim();
    const msg = document.getElementById('grammarMsg');
    msg.className = 'msg'; msg.textContent = '';
    if (!q) { msg.className = 'msg err'; msg.textContent = '질문을 입력해주세요.'; return; }
    try {
      await API.addGrammarQuestion(studentId, studentName, q);
      document.getElementById('grammarInput').value = '';
      msg.className = 'msg ok'; msg.textContent = '질문이 등록됐어요! 선생님이 답변할 예정이에요.';
      loadGrammar();
    } catch (e) {
      msg.className = 'msg err'; msg.textContent = e.message;
    }
  }

  async function deleteMyQuestion(id) {
    if (!confirm('질문을 삭제할까요?')) return;
    try {
      await API.deleteGrammarQuestion(id, studentId);
      loadGrammar();
    } catch (e) { alert(e.message); }
  }

  document.getElementById('addGrammarBtn').onclick = addGrammarQuestion;

  // ── 교재 단어 ─────────────────────────────────────────────
  let currentUnit = '';   // '' = 전체
  let currentTextbookId = null;
  let tbLessonInfo = {};
  let addedWordIds = new Set();

  // Unit 버튼 클릭 핸들러 (동적 버튼용)
  function bindUnitBtns() {
    document.querySelectorAll('.unit-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentUnit = btn.dataset.unit;
        loadTbContent();
      };
    });
  }

  document.getElementById('tbReloadBtn').onclick = loadTbContent;

  async function loadTextbook() {
    if (currentTextbookId) { loadTbContent(); return; }  // 이미 교재 확인됨

    document.getElementById('tbWordList').innerHTML    = '<div class="empty-words">불러오는 중... ⏳</div>';
    document.getElementById('tbGrammarList').innerHTML = '<div class="empty-words">불러오는 중... ⏳</div>';
    document.getElementById('tbProgressText').textContent = '교재 정보를 확인하는 중...';
    addedWordIds = new Set();

    try {
      const info = await API.getStudentTextbook(studentId);
      if (!info.textbook_id) {
        document.getElementById('tbWordList').innerHTML = `<div class="empty-words">📚 ${esc(info.message || '학교/학년을 설정해 주세요')}<br><small>선생님께 문의하세요</small></div>`;
        document.getElementById('tbGrammarList').innerHTML = '';
        document.getElementById('tbProgressText').textContent = '교재 미설정';
        return;
      }
      currentTextbookId = info.textbook_id;
      tbLessonInfo = info.lesson_info || {};

      // 헤더 표시
      const header = document.getElementById('tbInfoHeader');
      header.style.display = 'block';
      header.innerHTML = `📚 <strong>${esc(info.textbook_info?.publisher || '')} ${esc(info.textbook_info?.author || '')}</strong> ${esc(info.textbook_info?.title || info.textbook_id)} &nbsp;|&nbsp; ${info.school || ''} 고${info.grade || '?'}`;

      // Unit 버튼 동적 생성
      const sel = document.getElementById('unitSelector');
      sel.innerHTML = `<button class="unit-btn active" data-unit="">전체</button>`;
      const total = info.textbook_info?.total_units || 4;
      for (let i = 1; i <= total; i++) {
        const lessonTitle = tbLessonInfo[i]?.title || `Unit ${i}`;
        sel.innerHTML += `<button class="unit-btn" data-unit="${i}">L${i}</button>`;
      }
      bindUnitBtns();

      loadTbContent();
    } catch (e) {
      document.getElementById('tbWordList').innerHTML = `<div class="empty-words">불러오기 실패: ${esc(e.message)}</div>`;
    }
  }

  async function loadTbContent() {
    if (!currentTextbookId) return;
    document.getElementById('tbWordList').innerHTML    = '<div class="empty-words">불러오는 중... ⏳</div>';
    document.getElementById('tbGrammarList').innerHTML = '<div class="empty-words">불러오는 중... ⏳</div>';
    document.getElementById('tbProgressText').textContent = '교재 단어를 불러오는 중...';
    addedWordIds = new Set();
    try {
      const [wordsData, grammarData] = await Promise.all([
        API.getTextbookWords(currentTextbookId, currentUnit || null),
        API.getTextbookGrammar(currentTextbookId, currentUnit || null),
      ]);
      // 랜덤 30개 셔플
      const allWords = wordsData.words || [];
      const shuffled = allWords.sort(() => Math.random() - 0.5).slice(0, 30);
      renderTbWords(shuffled);
      renderTbGrammar(grammarData.grammar || []);
    } catch (e) {
      document.getElementById('tbWordList').innerHTML = `<div class="empty-words">불러오기 실패: ${esc(e.message)}</div>`;
    }
  }

  function renderTbWords(words) {
    const el = document.getElementById('tbWordList');
    const prog = document.getElementById('tbProgressText');
    if (!words.length) {
      el.innerHTML = '<div class="empty-words">🎉 이 Unit의 모든 단어를 이미 알고 있어요!</div>';
      prog.innerHTML = '모든 단어 완료! <strong>완벽해요 🎉</strong>';
      return;
    }
    prog.innerHTML = `교재 추천 단어 <strong>${words.length}개</strong> — 모르는 단어를 단어장에 추가하세요`;
    el.innerHTML = words.map(w => `
      <div class="tb-card" id="tbcard_${w.id}">
        <div class="tb-card-header">
          <span class="tb-unit-tag">Unit ${w.unit}</span>
          <span class="tb-pos-tag">${esc(w.part_of_speech)}</span>
        </div>
        <div class="tb-english">${esc(w.english)}</div>
        <div class="tb-korean">${esc(w.korean)}</div>
        <div class="tb-example">"${esc(w.example)}"</div>
        <div class="tb-actions">
          <button class="btn-know" onclick="tbKnow('${w.id}')">✅ 알아요</button>
          <button class="btn-dontknow" onclick="tbDontKnow('${w.id}', '${esc(w.english)}', '${esc(w.korean)}')">📌 몰라요 → 단어장 추가</button>
        </div>
      </div>
    `).join('');
  }

  function renderTbGrammar(grammar) {
    const el = document.getElementById('tbGrammarList');
    if (!grammar.length) { el.innerHTML = '<div class="empty-words">등록된 문법이 없어요</div>'; return; }
    el.innerHTML = grammar.map(g => `
      <div class="tb-grammar-card">
        <span class="tb-grammar-point">📐 ${esc(g.grammar_point)}</span>
        <div class="tb-grammar-sentence">${esc(g.sentence)}</div>
        <div class="tb-grammar-explanation">${esc(g.explanation)}</div>
        <div class="tb-grammar-pattern">패턴: ${esc(g.key_pattern)}</div>
        <div class="tb-grammar-q">Q. ${esc(g.question)}</div>
        <button class="tb-grammar-toggle" onclick="toggleGrammarAnswer(this)">▶ 정답 보기</button>
        <div class="tb-grammar-answer">A. ${esc(g.answer)}</div>
      </div>
    `).join('');
  }

  function toggleGrammarAnswer(btn) {
    const answerEl = btn.nextElementSibling;
    const isOpen = answerEl.style.display === 'block';
    answerEl.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? '▶ 정답 보기' : '▼ 정답 숨기기';
  }

  function tbKnow(wordId) {
    const card = document.getElementById('tbcard_' + wordId);
    if (!card) return;
    card.style.opacity = '0.4';
    card.style.transition = 'opacity .3s';
    setTimeout(() => { card.style.display = 'none'; }, 300);
  }

  async function tbDontKnow(wordId, english, korean) {
    const card = document.getElementById('tbcard_' + wordId);
    if (!card || addedWordIds.has(wordId)) return;
    const btn = card.querySelector('.btn-dontknow');
    btn.disabled = true; btn.textContent = '추가 중...';
    try {
      await API._fetch(`/students/${studentId}/words`, {
        method: 'POST',
        body: JSON.stringify({ english, korean, blank_type: 'korean' }),
      });
      addedWordIds.add(wordId);
      card.querySelector('.tb-actions').innerHTML =
        '<button class="btn-added">✅ 단어장에 추가됨</button>';
      loadWords();
    } catch (e) {
      if (e.message.includes('이미') || e.message.includes('duplicate')) {
        addedWordIds.add(wordId);
        card.querySelector('.tb-actions').innerHTML =
          '<button class="btn-added">✅ 이미 단어장에 있음</button>';
      } else {
        btn.disabled = false; btn.textContent = '📌 몰라요 → 단어장 추가';
        alert('추가 실패: ' + e.message);
      }
    }
  }

  // 초기 로드
  loadWords();
</script>

<script>
// ══════════════════════════════════════════════════════════════
// 수행평가 서술형 연습 모듈
// ══════════════════════════════════════════════════════════════
const WP = {
  step: 'select',       // 'select' | 'write' | 'result'
  selectedType: 'sentence_completion',
  sessionId: null,
  problem: null,
  targetWords: [],
  grade: null,
  wordUpdates: [],
  initialized: false,
}

const TYPE_META = {
  sentence_completion: { icon: '✏️', label: '조건영작',   desc: '조건에 맞게 영작' },
  word_arrangement:    { icon: '🔀', label: '단어 배열',  desc: '단어 순서 맞추기' },
  summary_writing:     { icon: '📋', label: '요약문 완성', desc: '지문 읽고 요약' },
  free_writing:        { icon: '🖊️', label: '자유 영작',  desc: '주제 보고 자유롭게' },
}

function wpEl() { return document.getElementById('wp-app') }

// ── Step 1: 유형 선택 ─────────────────────────────────────────
function wpRenderSelect() {
  const typeButtons = Object.entries(TYPE_META).map(([key, m]) => `
    <button class="wp-type-btn ${WP.selectedType === key ? 'selected' : ''}"
            data-type="${key}" onclick="wpSelectType('${key}')">
      <span class="wp-type-icon">${m.icon}</span>
      <strong>${m.label}</strong><br>
      <span style="font-size:.78rem;font-weight:400;color:#718096">${m.desc}</span>
    </button>`).join('')

  wpEl().innerHTML = `
    <div style="margin-bottom:16px">
      <p class="section-title">문제 유형 선택</p>
      <div class="wp-type-grid">${typeButtons}</div>
    </div>

    <div class="wp-hint-box" id="wpHintBox">
      <div class="wp-hint-label">💡 오늘의 집중 단어 (모르는 단어 기반)</div>
      <div class="wp-hint-words" id="wpHintWords">
        <span style="color:#a0aec0;font-size:.85rem">불러오는 중...</span>
      </div>
    </div>

    <button class="wp-generate-btn" id="wpGenBtn" onclick="wpGenerate()">
      🎲 문제 생성하기
    </button>
    <div style="height:12px"></div>

    <p class="section-title" style="margin-top:8px">최근 연습 기록</p>
    <div id="wpHistory"><div class="empty-words" style="padding:16px 0">불러오는 중...</div></div>
  `
  wpLoadHint()
  wpLoadHistory()
}

async function wpLoadHint() {
  try {
    const words = await API.getMyWords(studentId)
    const approved = words.filter(w => w.status === 'approved')
    const scored = approved
      .map(w => ({ ...w, p: (3 - Math.min(w.box || 1, 3)) * 3 + (w.wrong_count || 0) }))
      .sort((a, b) => b.p - a.p)
      .slice(0, 5)
    const el = document.getElementById('wpHintWords')
    if (!el) return
    if (!scored.length) { el.innerHTML = '<span style="color:#a0aec0;font-size:.85rem">승인된 단어가 없어요</span>'; return }
    el.innerHTML = scored.map(w =>
      `<div class="wp-hint-word">${esc(w.english)} <span>· ${esc(w.korean)}</span></div>`
    ).join('')
  } catch { }
}

async function wpLoadHistory() {
  const el = document.getElementById('wpHistory')
  if (!el) return
  try {
    const history = await API.writingHistory(studentId)
    if (!history.length) { el.innerHTML = '<div class="empty-words" style="padding:16px 0">아직 연습 기록이 없어요 ✏️</div>'; return }
    el.innerHTML = history.map(h => {
      const g = h.grade
      const total = g?.total ?? '?'
      const d = new Date(h.created_at)
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
      const color = total >= 7 ? '#38a169' : total >= 4 ? '#d69e2e' : '#e53e3e'
      const typeLabel = TYPE_META[h.problem_type]?.label ?? h.problem_type
      return `<div class="word-item">
        <span class="word-en" style="font-size:.88rem">${typeLabel}</span>
        <span class="word-ko" style="font-size:.82rem">${dateStr}</span>
        <span class="badge" style="background:none;color:${color};font-weight:800;font-size:.95rem">${total}/9</span>
      </div>`
    }).join('')
  } catch { el.innerHTML = '<div class="empty-words" style="padding:16px 0">기록 불러오기 실패</div>' }
}

function wpSelectType(type) {
  WP.selectedType = type
  document.querySelectorAll('.wp-type-btn').forEach(b => b.classList.remove('selected'))
  document.querySelectorAll('.wp-type-btn').forEach(b => {
    if (b.dataset.type === type) b.classList.add('selected')
  })
}

// ── Step 2: 문제 생성 + 답안 작성 ─────────────────────────────
async function wpGenerate() {
  const btn = document.getElementById('wpGenBtn')
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 문제 생성 중...' }

  wpEl().innerHTML = `
    <div class="wp-loading">
      <span class="wp-loading-spinner">⚙️</span>
      Gemini가 맞춤 문제를 만드는 중이에요...<br>
      <small style="font-size:.8rem">모르는 단어를 분석해서 출제합니다</small>
    </div>`

  try {
    const res = await API.writingGenerate(studentId, WP.selectedType)
    WP.sessionId = res.sessionId
    WP.problem = res.problem
    WP.targetWords = res.targetWords
    WP.step = 'write'
    wpRenderWrite()
  } catch (e) {
    wpEl().innerHTML = `
      <div class="empty-words" style="padding:32px 0">
        문제 생성 실패: ${esc(e.message)}<br>
        <button class="wp-retry-btn" style="margin-top:16px;max-width:200px" onclick="wpInit()">다시 시도</button>
      </div>`
  }
}

function wpRenderWrite() {
  const p = WP.problem
  const typeLabel = TYPE_META[p.type]?.label ?? p.type

  const conditions = Array.isArray(p.conditions)
    ? p.conditions.map((c, i) => `<div class="wp-condition-item"><span class="wp-condition-num">${i+1}.</span>${esc(c)}</div>`).join('')
    : ''

  const promptHtml = p.prompt
    ? `<div class="wp-problem-prompt">${esc(p.prompt)}</div>`
    : ''

  const hintWords = WP.targetWords.map(w =>
    `<div class="wp-hint-word">${esc(w.english)} <span>· ${esc(w.korean)}</span></div>`
  ).join('')

  wpEl().innerHTML = `
    <div class="wp-problem-card">
      <span class="wp-problem-tag">${typeLabel}</span>
      <div class="wp-problem-instruction">${esc(p.instruction)}</div>
      ${promptHtml}
      ${conditions ? `<div class="wp-conditions">
        <div class="wp-conditions-title">📌 조건</div>
        ${conditions}
      </div>` : ''}
    </div>

    <div class="wp-hint-box">
      <div class="wp-hint-label">💡 이 단어들을 활용해보세요 (선택사항)</div>
      <div class="wp-hint-words">${hintWords}</div>
    </div>

    <textarea class="wp-answer-area" id="wpAnswerInput"
      placeholder="여기에 영어 답안을 작성하세요..."
      oninput="document.getElementById('wpCharCount').textContent = this.value.length + '자'"></textarea>
    <div class="wp-char-count" id="wpCharCount">0자</div>

    <div class="wp-submit-row">
      <button class="wp-submit-btn" id="wpSubmitBtn" onclick="wpSubmit()">📤 제출하고 채점받기</button>
      <button class="wp-new-btn" onclick="wpInit()">🔄 새 문제</button>
    </div>
    <div class="msg" id="wpSubmitMsg" style="margin-top:8px"></div>
  `
}

// ── Step 3: 채점 ──────────────────────────────────────────────
async function wpSubmit() {
  const answer = document.getElementById('wpAnswerInput')?.value?.trim()
  const msg = document.getElementById('wpSubmitMsg')
  if (!answer) { msg.className = 'msg err'; msg.textContent = '답안을 입력해주세요.'; return }
  if (answer.length < 10) { msg.className = 'msg err'; msg.textContent = '더 자세하게 써보세요.'; return }

  const btn = document.getElementById('wpSubmitBtn')
  btn.disabled = true; btn.textContent = '⏳ AI 채점 중...'

  wpEl().innerHTML = `
    <div class="wp-loading">
      <span class="wp-loading-spinner">🤖</span>
      AI가 답안을 분석하고 채점하는 중이에요...<br>
      <small style="font-size:.8rem">내용 · 구성 · 표현을 꼼꼼히 확인합니다</small>
    </div>`

  try {
    const res = await API.writingGrade(studentId, WP.sessionId, answer)
    WP.grade = res.grade
    WP.wordUpdates = res.wordUpdates ?? []
    WP.step = 'result'
    wpRenderResult()
  } catch (e) {
    wpEl().innerHTML = `
      <div class="empty-words" style="padding:32px 0">
        채점 실패: ${esc(e.message)}<br>
        <button class="wp-retry-btn" style="margin-top:16px;max-width:200px" onclick="wpRenderWrite()">다시 제출</button>
      </div>`
  }
}

function wpRenderResult() {
  const g = WP.grade
  const pct = Math.round((g.total / 9) * 100)
  const scoreColor = g.total >= 7 ? '#38a169' : g.total >= 4 ? '#d69e2e' : '#e53e3e'

  const rubrics = [
    { key: 'content',    label: '내용', icon: '💡' },
    { key: 'structure',  label: '구성', icon: '🏗️' },
    { key: 'expression', label: '표현', icon: '✍️' },
  ]

  const rubricHtml = rubrics.map(r => {
    const item = g[r.key] ?? {}
    const s = item.score ?? 0
    const dots = [0,1,2,3].map(i => `<div class="wp-dot ${i < s ? 'on' : ''}"></div>`).join('')
    const improve = item.improvement ? `
      <button class="wp-improve-toggle" onclick="wpToggleImprove(this)">▶ 개선 방향 보기</button>
      <div class="wp-rubric-improve">${esc(item.improvement)}</div>` : ''
    return `<div class="wp-rubric-card">
      <div class="wp-rubric-header">
        <span style="font-size:1.1rem">${r.icon}</span>
        <span class="wp-rubric-name">${r.label}</span>
        <div class="wp-rubric-dots">${dots}</div>
        <span class="wp-rubric-score s${s}">${s}/3</span>
      </div>
      <div class="wp-rubric-comment">${esc(item.comment ?? '')}</div>
      ${improve}
    </div>`
  }).join('')

  // 단어 사용 결과
  const wordTagHtml = WP.wordUpdates.map(w => {
    if (w.used) return `<div class="wp-word-tag used">✓ ${esc(w.english)} ${w.newBox ? `→ Box ${w.newBox}` : ''}</div>`
    return `<div class="wp-word-tag unused">✗ ${esc(w.english)}</div>`
  }).join('')

  wpEl().innerHTML = `
    <div class="wp-score-header">
      <div class="wp-total-score" style="color:${scoreColor}">${g.total}<span class="wp-total-denom">/9</span></div>
      <div style="font-size:.85rem;color:#718096;margin-top:4px">${pct}% 달성</div>
      <div class="wp-score-bar-wrap">
        <div class="wp-score-bar" id="wpScoreBar" style="width:0%"></div>
      </div>
    </div>

    ${rubricHtml}

    <div class="wp-model-card">
      <div class="wp-model-title" onclick="wpToggleModel(this)">
        ✨ 모범 답안 보기 <span style="color:#a0aec0;font-size:.75rem;margin-left:auto">▶ 클릭</span>
      </div>
      <div class="wp-model-body" id="wpModelBody">${esc(g.model_answer ?? '')}</div>
    </div>

    ${WP.wordUpdates.length ? `
    <div class="wp-hint-box">
      <div class="wp-hint-label">🎯 단어 활용 결과</div>
      <div class="wp-word-results">${wordTagHtml}</div>
    </div>` : ''}

    <button class="wp-retry-btn" onclick="wpInit()">🔄 다시 연습하기</button>
    <div style="height:20px"></div>
  `

  // 애니메이션
  setTimeout(() => {
    const bar = document.getElementById('wpScoreBar')
    if (bar) bar.style.width = pct + '%'
  }, 100)
}

function wpToggleImprove(btn) {
  const el = btn.nextElementSibling
  const open = el.style.display === 'block'
  el.style.display = open ? 'none' : 'block'
  btn.textContent = open ? '▶ 개선 방향 보기' : '▼ 개선 방향 숨기기'
}

function wpToggleModel(titleEl) {
  const body = document.getElementById('wpModelBody')
  const open = body.style.display === 'block'
  body.style.display = open ? 'none' : 'block'
  const arrow = titleEl.querySelector('span:last-child')
  if (arrow) arrow.textContent = open ? '▶ 클릭' : '▼ 닫기'
}

// 탭 진입 시
function wpInit() {
  wpRenderSelect()
}
</script>
</body>
</html>
