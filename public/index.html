<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Word Gacha</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f6fafe; min-height: 100dvh; display: flex; flex-direction: column; }

/* ── Hero ── */
.hero { padding: 48px 20px 28px; text-align: center; }
.hero-icon { font-size: 2.8rem; margin-bottom: 12px; }
.hero h1 { font-family: 'Manrope', sans-serif; font-size: 1.8rem; font-weight: 800; color: #1e3a5f; letter-spacing: -.02em; }
.hero p  { color: #8a9ab0; font-size: .9rem; margin-top: 6px; }

/* ── Section Label ── */
.section-label { font-size: .68rem; font-weight: 700; color: #9aafc4; text-transform: uppercase; letter-spacing: .09em; padding: 0 20px; margin-bottom: 12px; }

/* ── Student List ── */
.scroll-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 4px 20px 16px;
}

/* ── Student Card ── */
.student-card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #fff;
  border-radius: 16px;
  padding: 16px 18px;
  cursor: pointer;
  box-shadow: 0 1px 6px rgba(0,0,0,.05);
  transition: transform .12s, box-shadow .12s;
}
.student-card:active { transform: scale(.98); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.student-card .avatar { font-size: 2rem; line-height: 1; flex-shrink: 0; }
.student-card .name { font-weight: 700; font-size: 1rem; color: #1e3a5f; flex: 1; }
.student-card .arrow { color: #c3cdd8; font-size: 1.1rem; }

/* ── Loading / Empty ── */
.loading-row { display: flex; flex-direction: column; gap: 10px; padding: 4px 20px 16px; }
.skeleton-card { width: 100%; height: 64px; border-radius: 16px; background: linear-gradient(90deg, #e8eef4 25%, #f4f8fc 50%, #e8eef4 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.empty { text-align: center; color: #9aafc4; padding: 40px 20px; font-size: .9rem; line-height: 1.7; }

/* ── Admin Link ── */
.admin-link { display: block; text-align: center; margin-top: auto; padding: 24px 0 calc(24px + env(safe-area-inset-bottom)); color: #b0bec5; font-size: .82rem; text-decoration: none; }
.admin-link:active { color: #4a6fa5; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-icon">📖</div>
  <h1>Word Gacha</h1>
  <p>이름을 선택해서 단어를 입력하세요</p>
</div>

<p class="section-label" id="sectionLabel" style="display:none">학생 선택</p>

<div class="loading-row" id="loadingRow">
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
  <div class="skeleton-card"></div>
</div>

<div class="scroll-row" id="scrollRow" style="display:none"></div>
<p class="empty" id="empty" style="display:none">등록된 학생이 없습니다.<br>선생님에게 문의하세요.</p>

<a href="login.html" class="admin-link">선생님 로그인 →</a>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
(async () => {
  try {
    const res  = await fetch('version.json?_=' + Date.now());
    const { v } = await res.json();
    const saved = localStorage.getItem('appVersion');
    if (saved && saved !== v) { localStorage.setItem('appVersion', v); location.reload(true); return; }
    localStorage.setItem('appVersion', v);
  } catch {}
})();
</script>
<script>
  const avatars = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮'];
  function getAvatar(name, index) {
    if (name === '이루다') return '🌻';
    if (name === '정윤재') return '🦕';
    if (name === '임지안') return '🐒';
    return avatars[index % avatars.length];
  }

  async function load() {
    try {
      const students = await API.getStudents();
      document.getElementById('loadingRow').style.display = 'none';
      if (!students.length) { document.getElementById('empty').style.display = 'block'; return; }

      document.getElementById('sectionLabel').style.display = 'block';
      const row = document.getElementById('scrollRow');
      row.style.display = 'flex';

      students.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'student-card';
        card.innerHTML = `<div class="avatar">${getAvatar(s.name, i)}</div><div class="name">${s.name}</div><span class="arrow">›</span>`;
        card.onclick = () => {
          sessionStorage.setItem('studentId',   s.id);
          sessionStorage.setItem('studentName', s.name);
          window.location.href = 'student.html';
        };
        row.appendChild(card);
      });
    } catch {
      document.getElementById('loadingRow').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
      document.getElementById('empty').textContent = '서버에 연결할 수 없습니다.';
    }
  }
  load();
</script>
</body>
</html>
